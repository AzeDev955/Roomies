services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roomies
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/roomies
      JWT_SECRET: super_secreto_desarrollo_cambiar_en_produccion
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "8081:8081"
    environment:
      # Cambia <TU_IP_LOCAL> por la IP de tu máquina en la red (ej: 192.168.1.X)
      # Se puede obtener con: ipconfig (Windows) / ifconfig (Mac/Linux)
      EXPO_PUBLIC_API_URL: http://<TU_IP_LOCAL>:3000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
